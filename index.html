<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
  <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPgnpkI4DNTlrdUmTzrDgektczlKNRRhy5X5AAOnx5S09ydFYWWNSfcEqDTTHgtNA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
</head>
<body>
    <div class="container">
        <h1>&#128218; Smart Study Planner</h1>
        <div class="day-selector" id="day-selector">
           <button class="day-btn active" data-day="monday">Mon</button>
           <button class="day-btn" data-day="tuesday">Tue</button>
           <button class="day-btn" data-day="wednesday">Wed</button>
           <button class="day-btn" data-day="thursday">Thu</button>
           <button class="day-btn" data-day="friday">Fri</button>
           <button class="day-btn" data-day="saturday">Sat</button>
           <button class="day-btn" data-day="sunday">Sun</button>
        </div>
        <div class="input-section">
            <input type="text" id="subject" placeholder="subject (e.g. math)">
            <div class="time-slot-generator">
                <label>Start Time:<input type="time" id="start-time"></label>
                <label>
                    Duration:
                    <select  id="duration">
                        <option value="15">15 min</option>
                         <option value="30" selected>30 min</option>
                          <option value="60">60 min</option>
                    </select>
                </label>
                <button type="button" id="generate-slot">Generate Time Slot</button>
            </div>
            <input type="text" id="time" placeholder="time slot" readonly>
            <input type="text" id="goal" placeholder="Goal/Task (e.g., Practice Algebra)">
            <button id="add-btn">&#10133; Add to Timetable</button>
        </div>
        <div class="timetable" id="timetable">
            <h2>&#128467; Your Timetable</h2>
            <div id="entries"></div>
        </div>
        <!--Download Button-->
        <div style="text-align: center; margin-top: 2rem;">
            <button id="download-pdf">&#128196; Download Weekly Timetable</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
